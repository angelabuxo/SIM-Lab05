<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Micromon — Snap! + Insight Maker + Visualització</title>
  <style>
    :root { --gutter: 8px; --minPane: 160px; --minPaneV: 120px; }
    html, body { height: 100%; margin: 0; }
    .split {
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr var(--gutter) 1fr;
      overflow: hidden;
      user-select: none;
    }
    .pane { overflow: hidden; min-width: 0; }
    .pane-label {
      position: absolute;
      top: 4px;
      left: 8px;
      z-index: 2;
      font: 11px/1.2 system-ui, sans-serif;
      color: #475569;
      background: rgba(255,255,255,0.85);
      padding: 2px 6px;
      border-radius: 4px;
      pointer-events: none;
    }
    .pane-inner { position: relative; width: 100%; height: 100%; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }

    .left-stack {
      display: grid;
      grid-template-rows: 1fr var(--gutter) 1fr;
      height: 100%;
      overflow: hidden;
    }
    .vdivider {
      cursor: row-resize;
      background: #e5e7eb;
      position: relative;
      touch-action: none;
    }
    .vdivider::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      width: 100%;
      height: 2px;
      background: #9ca3af;
      opacity: 0.8;
    }
    .sub-pane { overflow: hidden; min-height: 0; }

    .divider {
      cursor: col-resize;
      background: #e5e7eb;
      position: relative;
      touch-action: none;
    }
    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 2px;
      height: 100%;
      background: #9ca3af;
      opacity: 0.8;
    }

    .dragging { cursor: col-resize; }
    .dragging iframe { pointer-events: none; }
    .dragging-vert { cursor: row-resize; }
    .dragging-vert iframe { pointer-events: none; }
  </style>
</head>
<body>
  <div class="split" id="split">
    <div class="pane">
      <div class="left-stack" id="leftStack">
        <div class="sub-pane">
          <div class="pane-inner">
            <span class="pane-label">Snap! (control)</span>
            <iframe id="snapFrame" title="Snap!"></iframe>
          </div>
        </div>
        <div class="vdivider" id="vdivider" aria-label="Separador vertical"></div>
        <div class="sub-pane">
          <div class="pane-inner">
            <span class="pane-label">Insight Maker (model)</span>
            <iframe
              title="Insight Maker"
              src="https://insightmaker.com/insight/4uanRT82clj5QHRmZOUhRi/12E-Lab03-Base">
            </iframe>
          </div>
        </div>
      </div>
    </div>
    <div class="divider" id="divider-h" aria-label="Separador horitzontal"></div>
    <div class="pane">
      <div class="pane-inner">
        <span class="pane-label">Visualització 2D (p5.js)</span>
        <iframe title="Visualització" src="viz.html?channel=upc&demo=0"></iframe>
      </div>
    </div>
  </div>

  <script>
    (function loadSnap() {
      const project = "https://raw.githubusercontent.com/angelabuxo/SIM-Lab05/main/InsightMaker.xml";
      document.getElementById("snapFrame").src =
        `https://snap.berkeley.edu/snap/snap.html#open:${encodeURIComponent(project)}`;
    })();

    const split = document.getElementById("split");
    const leftStack = document.getElementById("leftStack");
    const dividerH = document.getElementById("divider-h");
    const vdivider = document.getElementById("vdivider");
    const gutter = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--gutter")) || 8;
    const minPane = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--minPane")) || 160;
    const minPaneV = parseInt(getComputedStyle(document.documentElement).getPropertyValue("--minPaneV")) || 120;

    let draggingH = false;
    let draggingV = false;

    function setColumns(x) {
      const rect = split.getBoundingClientRect();
      const total = rect.width - gutter;
      const min = minPane;
      x = Math.max(min, Math.min(total - min, x));
      split.style.gridTemplateColumns = `${x}px ${gutter}px ${total - x}px`;
    }

    function setRows(y) {
      const rect = leftStack.getBoundingClientRect();
      const total = rect.height - gutter;
      const min = minPaneV;
      y = Math.max(min, Math.min(total - min, y));
      leftStack.style.gridTemplateRows = `${y}px ${gutter}px ${total - y}px`;
    }

    function initColumns() {
      const rect = split.getBoundingClientRect();
      const total = rect.width - gutter;
      setColumns(total / 2);
    }

    function initRows() {
      const rect = leftStack.getBoundingClientRect();
      const total = rect.height - gutter;
      setRows(total / 2);
    }

    function onDownH(e) {
      draggingH = true;
      document.body.classList.add("dragging");
      e.preventDefault();
    }

    function onDownV(e) {
      draggingV = true;
      document.body.classList.add("dragging-vert");
      e.preventDefault();
    }

    function onMove(e) {
      if (draggingH) {
        const rect = split.getBoundingClientRect();
        const clientX = (e.touches && e.touches[0]) ? e.touches[0].clientX : e.clientX;
        setColumns(clientX - rect.left);
        e.preventDefault();
      }
      if (draggingV) {
        const rect = leftStack.getBoundingClientRect();
        const clientY = (e.touches && e.touches[0]) ? e.touches[0].clientY : e.clientY;
        setRows(clientY - rect.top);
        e.preventDefault();
      }
    }

    function onUp() {
      if (draggingH) document.body.classList.remove("dragging");
      if (draggingV) document.body.classList.remove("dragging-vert");
      draggingH = false;
      draggingV = false;
    }

    initColumns();
    initRows();
    window.addEventListener("resize", () => { initColumns(); initRows(); });

    dividerH.addEventListener("mousedown", onDownH);
    vdivider.addEventListener("mousedown", onDownV);
    window.addEventListener("mousemove", onMove);
    window.addEventListener("mouseup", onUp);

    dividerH.addEventListener("touchstart", onDownH, { passive: false });
    vdivider.addEventListener("touchstart", onDownV, { passive: false });
    window.addEventListener("touchmove", onMove, { passive: false });
    window.addEventListener("touchend", onUp);
  </script>
</body>
</html>
